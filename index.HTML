<div id="price">Loading...</div>
<div id="signal">WAIT</div>
<div id="analysis">--</div>

<script>
// =========================
// 🔥 CONFIG
// =========================
const TELEGRAM_TOKEN = "ใส่ของใหม่ (อย่าใช้ตัวที่ส่งมาแล้ว)";
const CHAT_ID = "8077905290";

let lastSignal = "";

// =========================
// 🔥 ดึงราคาทองจริง (ใช้ Yahoo Finance)
// =========================
async function getPrice() {
  try {
    let res = await fetch("https://query1.finance.yahoo.com/v8/finance/chart/GC=F");
    let data = await res.json();

    let price = data.chart.result[0].meta.regularMarketPrice;
    document.getElementById("price").innerText = price.toFixed(2);

    analyze(price);

  } catch (e) {
    document.getElementById("price").innerText = "ERROR";
    console.log(e);
  }
}

// =========================
// 🔥 AI วิเคราะห์ (พื้นฐานก่อน)
// =========================
function analyze(price) {

  let signal = "WAIT";
  let analysis = "";

  if (price > 4500) {
    signal = "SELL 🔴";
    analysis = "เข้าโซนบน มีโอกาสลง (SMC: Liquidity)";
  }
  else if (price < 4450) {
    signal = "BUY 🟢";
    analysis = "โซนล่าง มีแรงรับ (Demand)";
  } else {
    signal = "WAIT";
    analysis = "รอจังหวะ";
  }

  document.getElementById("signal").innerText = signal;
  document.getElementById("analysis").innerText = analysis;

  // =========================
  // 🔔 แจ้ง Telegram
  // =========================
  if (signal !== lastSignal && signal !== "WAIT") {
    sendTelegram(signal + " | ราคา: " + price);
    lastSignal = signal;
  }
}

// =========================
// 🔥 ส่ง Telegram
// =========================
function sendTelegram(text) {
  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  });
}

// =========================
// 🔁 LOOP
// =========================
setInterval(getPrice, 5000);
getPrice();

</script>
