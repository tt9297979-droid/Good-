<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Gold AI Ultimate</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.container { max-width:1100px; margin:auto; }
.card { background:#1e293b; padding:15px; margin:10px; border-radius:12px; }
.buy { color:#22c55e; }
.sell { color:#ef4444; }
.wait { color:#facc15; }
</style>
</head>

<body>
<div class="container">
<h1>🚀 Gold AI Ultimate (SMC PRO)</h1>

<div id="chart" style="height:400px;"></div>

<div class="card">
<h2>📊 ราคา</h2>
<p id="price">--</p>
</div>

<div class="card">
<h2>🎯 Signal</h2>
<p id="signal">WAIT</p>
<p id="sl"></p>
<p id="tp"></p>
</div>

<div class="card">
<h2>🧠 วิเคราะห์</h2>
<p id="detail">--</p>
</div>

</div>

<script>
// ===== ขอแจ้งเตือน =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// ===== Notify =====
function notify(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body: body });
  }
}

// ===== Telegram =====
function sendTelegram(msg){
  fetch(`https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage?chat_id=YOUR_CHAT_ID&text=${msg}`);
}

// ===== TradingView =====
new TradingView.widget({
  container_id: "chart",
  symbol: "OANDA:XAUUSD",
  interval: "5",
  theme: "dark",
  style: "1",
  locale: "th",
  width: "100%",
  height: "400"
});

// ===== ดึงข้อมูลจริง =====
async function getCandles(){
  let res = await fetch("https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=5m&limit=100");
  let data = await res.json();
  return data.map(c => ({
    open:+c[1], high:+c[2], low:+c[3], close:+c[4], volume:+c[5]
  }));
}

// ===== Logic =====
function getTrend(data){
  return data[data.length-1].close > data[data.length-20].close ? "UP" : "DOWN";
}

function detectBOS(data){
  let last = data[data.length-1];
  let hh = Math.max(...data.slice(-20).map(c=>c.high));
  let ll = Math.min(...data.slice(-20).map(c=>c.low));
  if(last.close > hh) return "UP";
  if(last.close < ll) return "DOWN";
  return "NONE";
}

function detectFVG(data){
  let c1 = data[data.length-3];
  let c3 = data[data.length-1];
  if(c1.high < c3.low) return "UP";
  if(c1.low > c3.high) return "DOWN";
  return "NONE";
}

function volumeOK(data){
  let avg = data.slice(-20).reduce((a,b)=>a+b.volume,0)/20;
  return data[data.length-1].volume > avg;
}

// ===== วิเคราะห์ + แจ้งเตือน =====
function analyze(data){
  let price = data[data.length-1].close;
  let trend = getTrend(data);
  let bos = detectBOS(data);
  let fvg = detectFVG(data);
  let vol = volumeOK(data);

  document.getElementById("price").innerText = price;

  let signal="⏳ WAIT";
  let sl="", tp="";

  if(trend==="DOWN" && bos==="DOWN" && fvg==="DOWN" && vol){
    signal="🔴 SELL";
    sl = price + 20;
    tp = price - 40;

    let msg = `SELL XAUUSD\nEntry:${price}\nSL:${sl}\nTP:${tp}`;
    notify("SELL SIGNAL", msg);
    sendTelegram(msg);
  }

  if(trend==="UP" && bos==="UP" && fvg==="UP" && vol){
    signal="🟢 BUY";
    sl = price - 20;
    tp = price + 40;

    let msg = `BUY XAUUSD\nEntry:${price}\nSL:${sl}\nTP:${tp}`;
    notify("BUY SIGNAL", msg);
    sendTelegram(msg);
  }

  document.getElementById("signal").innerHTML = signal;
  document.getElementById("sl").innerText = "SL: "+sl;
  document.getElementById("tp").innerText = "TP: "+tp;
  document.getElementById("detail").innerText = `${trend} | BOS:${bos} | FVG:${fvg} | VOL:${vol}`;
}

// ===== LOOP =====
setInterval(async()=>{
  let data = await getCandles();
  analyze(data);
},5000);

</script>

</body>
</html>
<div id="price">--</div>
<div id="signal">รอ</div>
<div id="analysis">--</div>
