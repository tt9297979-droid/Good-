<div id="price">Loading...</div>
<div id="signal">WAIT</div>
<div id="analysis">--</div>
<script>
// =====================
// 🔥 CONFIG
// =====================
const TELEGRAM_TOKEN = "8165823416:AAE9HrB-xwSU7m4xS8zXhT02uvMAF2HaSJQ";
const CHAT_ID = "8077905290";

let lastSignal = "";

// =====================
// 🔥 API หลัก + สำรอง
// =====================
async function getPrice() {
  try {
    // 🥇 API หลัก
    let res = await fetch("https://api.gold-api.com/price/XAU");
    let data = await res.json();

    if (!data.price) throw "fail";

    update(data.price);

  } catch {
    try {
      // 🥈 API สำรอง (FX)
      let res = await fetch("https://api.exchangerate.host/latest?base=XAU&symbols=USD");
      let data = await res.json();

      let price = 1 / data.rates.USD * 1000;

      update(price);

    } catch {
      document.getElementById("price").innerText = "ERROR";
    }
  }
}

// =====================
// 🔥 AI CORE (โหดจริง)
// =====================
let prices = [];

function update(price) {
  document.getElementById("price").innerText = price.toFixed(2);

  prices.push(price);
  if (prices.length > 50) prices.shift();

  analyze(price);
}

// =====================
// 🔥 RSI
// =====================
function getRSI() {
  if (prices.length < 14) return 50;

  let gains = 0, losses = 0;

  for (let i = prices.length - 14; i < prices.length; i++) {
    let diff = prices[i] - prices[i - 1];
    if (diff >= 0) gains += diff;
    else losses -= diff;
  }

  let rs = gains / (losses || 1);
  return 100 - (100 / (1 + rs));
}

// =====================
// 🔥 ULTRA ANALYZE
// =====================
function analyze(price) {
  let signal = "WAIT";
  let text = "";

  let rsi = getRSI();

  // 🔥 Trend
  let trend = prices.length > 20 && price > prices[0] ? "UP" : "DOWN";

  // =====================
  // 🔥 SMC + RSI + Trend
  // =====================
  if (price > 4500 && rsi > 60 && trend === "DOWN") {
    signal = "SELL";
    text = "📦 Supply + RSI Overbought + Trend ลง";
  }

  else if (price < 4480 && rsi < 40 && trend === "UP") {
    signal = "BUY";
    text = "📦 Demand + RSI Oversold + Trend ขึ้น";
  }

  // 🔥 Stop Hunt
  if (price > 4490 && price < 4500) {
    text += " | ⚠️ Stop Hunt Zone";
  }

  // =====================
  // 🔥 แสดงผล
  // =====================
  document.getElementById("signal").innerText = signal;
  document.getElementById("analysis").innerText = `${text} | RSI: ${rsi.toFixed(0)}`;

  // =====================
  // 🔔 แจ้งเตือน
  // =====================
  if (signal !== lastSignal && signal !== "WAIT") {
    sendTelegram(signal, price, text);
    notify(signal, price);
    lastSignal = signal;
  }
}

// =====================
// 🔔 TELEGRAM
// =====================
function sendTelegram(signal, price, text) {
  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: `🔥 ${signal}\n💰 ${price}\n📊 ${text}`
    })
  });
}

// =====================
// 🔔 NOTIFICATION
// =====================
function notify(signal, price) {
  if (Notification.permission === "granted") {
    new Notification("Gold AI", {
      body: `${signal} @ ${price}`
    });
  }
}

Notification.requestPermission();

// =====================
// 🚀 START
// =====================
setInterval(getPrice, 3000);
getPrice();
</script>
