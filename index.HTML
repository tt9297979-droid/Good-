<script>

// ===== API MULTI SOURCE =====
async function getPrice(){
  try{
    let price;

    // 🔹 API หลัก
    try{
      const res = await fetch("https://api.metals.live/v1/spot/gold");
      const data = await res.json();
      price = data[0].price;
    }catch{
      // 🔹 API สำรอง
      const res2 = await fetch("https://api.gold-api.com/price/XAUUSD");
      const data2 = await res2.json();
      price = data2.price;
    }

    if(!price) return;

    document.getElementById("price").innerText = price;

    prices.push(price);
    if(prices.length > 120) prices.shift();

    analyze(price);

  }catch(e){
    console.log("ERROR:", e);
  }
}

// ===== INDICATOR =====
function RSI(){
  if(prices.length < 14) return 50;
  let g=0,l=0;
  for(let i=1;i<prices.length;i++){
    let d=prices[i]-prices[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function EMA(p){
  let k=2/(p+1);
  let ema=prices[0];
  for(let i=1;i<prices.length;i++){
    ema=prices[i]*k + ema*(1-k);
  }
  return ema;
}

// ===== SMC CORE =====
let lastHigh=0;
let lastLow=999999;

function analyze(price){

  let rsi = RSI();
  let ema50 = EMA(50);
  let ema200 = EMA(200);

  let trend = ema50 > ema200 ? "UP" : "DOWN";

  // ===== Liquidity =====
  let high = Math.max(...prices);
  let low = Math.min(...prices);

  let stopHuntUp = price > high * 0.9995;
  let stopHuntDown = price < low * 1.0005;

  let signal="WAIT";
  let text="รอจังหวะ Sniper";
  let zone="";
  let sl="",tp="";

  // 🔴 SELL SNIPER
  if(stopHuntUp && rsi>65 && trend==="DOWN"){
    signal="SELL 🔴";
    text="Stop Hunt + Liquidity Grab + Downtrend";
    zone="📍 Supply Zone";

    sl=(price+10).toFixed(2);
    tp=(price-25).toFixed(2);
  }

  // 🟢 BUY SNIPER
  else if(stopHuntDown && rsi<35 && trend==="UP"){
    signal="BUY 🟢";
    text="Stop Hunt + Liquidity Grab + Uptrend";
    zone="📍 Demand Zone";

    sl=(price-10).toFixed(2);
    tp=(price+25).toFixed(2);
  }

  updateUI(signal,text,zone,sl,tp);

  if(signal !== lastSignal && signal !== "WAIT"){
    alertUser(signal,price,sl,tp);
  }

  lastSignal = signal;
}

// ===== ALERT =====
function alertUser(signal,price,sl,tp){

  // 🔔 Browser
  if(Notification.permission==="granted"){
    new Notification(signal,{
      body:`${price} | SL:${sl} TP:${tp}`
    });
  }

  // 🤖 Telegram
  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:CHAT_ID,
      text:`🔥 ${signal}
ราคา: ${price}
SL: ${sl}
TP: ${tp}`
    })
  });
}

// ===== START =====
setInterval(getPrice,4000);
getPrice();

</script>
