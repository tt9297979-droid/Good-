<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🔥 GOLD AI FINAL PRO</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {background:#0b1220;color:white;text-align:center;font-family:sans-serif;}
.card {background:#1a233a;padding:15px;margin:10px;border-radius:12px;}
.buy {color:#00ff88;font-size:26px;}
.sell {color:#ff4d4d;font-size:26px;}
.wait {color:gray;font-size:22px;}
.zone {color:orange;}
</style>
</head>

<body>

<h2>🔥 GOLD AI FINAL PRO</h2>

<div id="tv_chart" style="height:400px;"></div>

<div class="card">
<h3>📊 ราคา</h3>
<div id="price">--</div>
</div>

<div class="card">
<h3>🎯 Signal</h3>
<div id="signal" class="wait">WAIT</div>
<div id="sl"></div>
<div id="tp"></div>
</div>

<div class="card">
<h3>🧠 วิเคราะห์</h3>
<div id="analysis">--</div>
<div id="zone" class="zone"></div>
</div>

<script>
// ===== TradingView =====
new TradingView.widget({
  container_id:"tv_chart",
  symbol:"OANDA:XAUUSD",
  interval:"5",
  theme:"dark",
  width:"100%",
  height:400
});

// ===== Telegram =====
const TELEGRAM_TOKEN = "ใส่TOKEN";
const CHAT_ID = "8077905290";

// ===== DATA =====
let prices=[];

// ===== API =====
async function getPrice(){
  const res = await fetch("https://api.gold-api.com/price/XAUUSD");
  const data = await res.json();

  let price=data.price;
  document.getElementById("price").innerText=price;

  prices.push(price);
  if(prices.length>100) prices.shift();

  analyze(price);
}

// ===== RSI =====
function RSI(){
  if(prices.length<14) return 50;
  let g=0,l=0;
  for(let i=1;i<prices.length;i++){
    let d=prices[i]-prices[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

// ===== EMA =====
function EMA(period){
  let k=2/(period+1);
  let ema=prices[0];
  for(let i=1;i<prices.length;i++){
    ema=prices[i]*k + ema*(1-k);
  }
  return ema;
}

// ===== MACD =====
function MACD(){
  return EMA(12)-EMA(26);
}

// ===== CORE =====
let lastSignal="";

function analyze(price){

  let rsi=RSI();
  let macd=MACD();
  let ema50=EMA(50);
  let ema200=EMA(200);

  let trend = ema50>ema200 ? "UP" : "DOWN";

  let high=Math.max(...prices);
  let low=Math.min(...prices);

  let signal="WAIT";
  let text="รอจุดเข้า";
  let zone="";
  let sl="",tp="";

  // 🔴 SELL
  if(price>=high*0.999 && rsi>70 && macd<0 && trend==="DOWN"){
    signal="SELL 🔴";
    text="Liquidity + Downtrend + RSI Overbought";
    zone="📍 Supply Zone";

    sl=(price+12).toFixed(2);
    tp=(price-30).toFixed(2);
  }

  // 🟢 BUY
  else if(price<=low*1.001 && rsi<30 && macd>0 && trend==="UP"){
    signal="BUY 🟢";
    text="Liquidity + Uptrend + RSI Oversold";
    zone="📍 Demand Zone";

    sl=(price-12).toFixed(2);
    tp=(price+30).toFixed(2);
  }

  updateUI(signal,text,zone,sl,tp);

  if(signal!==lastSignal && signal!=="WAIT"){
    alertUser(signal,price,sl,tp);
  }

  lastSignal=signal;
}

// ===== UI =====
function updateUI(signal,text,zone,sl,tp){
  let s=document.getElementById("signal");
  s.innerText=signal;

  s.className = signal.includes("BUY")?"buy":
                signal.includes("SELL")?"sell":"wait";

  document.getElementById("analysis").innerText=text;
  document.getElementById("zone").innerText=zone;
  document.getElementById("sl").innerText=sl?"SL: "+sl:"";
  document.getElementById("tp").innerText=tp?"TP: "+tp:"";
}

// ===== ALERT =====
function alertUser(signal,price,sl,tp){

  // Browser
  if(Notification.permission==="granted"){
    new Notification(signal,{
      body:`XAUUSD ${price} | SL:${sl} TP:${tp}`
    });
  }

  // Telegram
  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:CHAT_ID,
      text:`🔥 ${signal}
ราคา: ${price}
SL: ${sl}
TP: ${tp}`
    })
  });
}

// ขอสิทธิ์แจ้งเตือน
if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

// ===== LOOP =====
setInterval(getPrice,5000);
getPrice();

</script>

</body>
</html>
