<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<!-- 🔥 บังคับมือถือ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Z8 ONLINE</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
  font-size:15px;
}

/* 🔥 ล็อกความกว้างมือถือ */
.wrapper{
  max-width:420px;
  margin:auto;
  width:100%;
  padding-bottom:60px;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px 10px;
}
.logo{
  width:75px;
  border-radius:50%;
  box-shadow:0 0 15px #22c55e;
}
h1{
  font-size:20px;
  color:#38bdf8;
}

/* REF */
.ref{
  text-align:center;
  color:#22c55e;
  font-weight:bold;
  font-size:16px;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:14px;
  border-radius:12px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  background:#22c55e;
  color:black;
}

/* STATUS */
.status{
  text-align:center;
  font-size:12px;
  opacity:0.8;
}

/* 🔥 ปุ่มลอย (มือถือโคตรดี) */
.floatBtn{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  padding:14px;
  background:#22c55e;
  color:black;
  border:none;
  border-radius:14px;
  font-weight:bold;
}

/* PDPA */
.pdpa{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  color:#22c55e;
  font-size:11px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">
<h1>🔥 Z8 ONLINE 🔥</h1>
</div>

<div class="ref">📌 ผู้แนะนำ: วิน</div>

<div class="card">
<b>📋 กรอกข้อมูลสมัคร</b>

<input id="name" placeholder="ชื่อ-นามสกุล">
<input id="idcard" placeholder="เลขบัตรประชาชน">
<input id="phone" placeholder="เบอร์โทร">
<input id="email" placeholder="อีเมล">
<textarea id="address" placeholder="ที่อยู่"></textarea>

<p class="status" id="status">ระบบจะขอพิกัดอัตโนมัติ</p>
</div>

</div>

<!-- 🔥 ปุ่มลอย -->
<button class="floatBtn" onclick="submitForm()">
🚀 สมัครงานทันที
</button>

<div class="pdpa">
🔒 ยินยอมตาม PDPA ข้อมูลใช้เพื่อสมัครงานเท่านั้น
</div>

<script>
function submitForm(){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;

  if(!name || !phone){
    alert("กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  document.getElementById("status").innerText="📍 กำลังขอตำแหน่ง...";

  navigator.geolocation.getCurrentPosition(function(pos){

    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    let location=`https://maps.google.com/?q=${lat},${lon}`;

    let text=`🔥 สมัครงาน Z8 ONLINE

📌 ผู้แนะนำ: วิน

👤 ชื่อ: ${name}
📱 เบอร์: ${phone}

📍 ${location}

📎 แนบ:
- รูปบัตร
- รูปหน้าคู่บัตร
- ข้อมูลบัญชี`;

    copy(text);

    document.getElementById("status").innerText="✅ คัดลอกแล้ว";

    setTimeout(()=>{
      window.location.href="https://www.facebook.com/share/1RtTcrR6Bu/";
    },700);

  });
}

function copy(text){
  let t=document.createElement("textarea");
  t.value=text;
  document.body.appendChild(t);
  t.select();
  document.execCommand("copy");
  document.body.removeChild(t);
}
</script>

</body>
</html>
