<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z8 ONLINE</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
}
.wrapper{max-width:480px;margin:auto;}

.header{text-align:center;padding:20px;}
.logo{
  width:80px;border-radius:50%;
  box-shadow:0 0 20px #22c55e;
}
h1{color:#38bdf8;}

.ref{
  text-align:center;
  color:#22c55e;
  font-weight:bold;
}

.card{
  background:#111;
  margin:12px;
  padding:15px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:black;
  font-weight:bold;
}

.status{
  text-align:center;
  font-size:12px;
}

.pdpa{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  color:#22c55e;
  font-size:11px;
  overflow:hidden;
}
.pdpa span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 18s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(100%);}
  to{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">
<h1>🔥 Z8 ONLINE 🔥</h1>
</div>

<div class="ref">📌 ผู้แนะนำ: วิน</div>

<div class="card">
<b>📋 กรอกข้อมูลสมัคร</b>

<input id="name" placeholder="ชื่อ-นามสกุล">
<input id="idcard" placeholder="เลขบัตรประชาชน">
<input id="phone" placeholder="เบอร์โทร">
<input id="email" placeholder="อีเมล">
<textarea id="address" placeholder="ที่อยู่"></textarea>

<button class="btn" onclick="submitForm()">🚀 สมัครงานทันที</button>
<p class="status" id="status">ระบบจะขอพิกัดอัตโนมัติ</p>
</div>

</div>

<div class="pdpa">
<span>🔒 ระบบขอความยินยอมตาม PDPA ข้อมูลใช้เพื่อสมัครงานเท่านั้น</span>
</div>

<script>
function submitForm(){

  let name=document.getElementById("name").value;
  let id=document.getElementById("idcard").value;
  let phone=document.getElementById("phone").value;
  let email=document.getElementById("email").value;
  let address=document.getElementById("address").value;

  if(!name || !phone){
    alert("กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  document.getElementById("status").innerText="📍 กำลังขอตำแหน่ง...";

  if(!navigator.geolocation){
    proceed("(ไม่มีพิกัด)",name,id,phone,email,address);
    return;
  }

  navigator.geolocation.getCurrentPosition(function(pos){

    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    let location=`https://maps.google.com/?q=${lat},${lon}`;

    proceed(location,name,id,phone,email,address);

  },function(){
    proceed("(ไม่ได้เปิดตำแหน่ง)",name,id,phone,email,address);
  });
}

function proceed(location,name,id,phone,email,address){

  let text=`🔥 สมัครงาน Z8 ONLINE

📌 ผู้แนะนำ: วิน

👤 ชื่อ: ${name}
🆔 เลขบัตร: ${id}
📱 เบอร์: ${phone}
📧 อีเมล: ${email}
🏠 ที่อยู่: ${address}

📍 พิกัด:
${location}

📎 แนบ:
- รูปบัตร
- รูปหน้าคู่บัตร
- ข้อมูลบัญชี`;

  copy(text);

  document.getElementById("status").innerText="✅ คัดลอกแล้ว ไปส่งให้ HR";

  setTimeout(()=>{
    window.location.href="https://www.facebook.com/share/1RtTcrR6Bu/";
  },800);
}

function copy(text){
  try{
    navigator.clipboard.writeText(text);
  }catch{
    let t=document.createElement("textarea");
    t.value=text;
    document.body.appendChild(t);
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);
  }
}
</script>

</body>
</html>
