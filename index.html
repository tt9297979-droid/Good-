<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🔥 GOLD AI ULTRA</title>

<style>
body {
  background:#0b132b;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
.box {
  background:#1c2541;
  margin:10px;
  padding:20px;
  border-radius:12px;
}
</style>

</head>
<body>

<h1>🔥 GOLD AI ULTRA</h1>

<div class="box">📊 ราคา: <span id="price">Loading...</span></div>
<div class="box">🎯 Signal: <span id="signal">WAIT</span></div>
<div class="box">🧠 วิเคราะห์: <span id="analysis">--</span></div>

<script>
let lastSignal = "";

// ======================
// 📊 ราคา (ผ่าน API)
// ======================
async function getPrice() {
  try {
    let res = await fetch("/api/price");
    let data = await res.json();

    let price = data.price;
    document.getElementById("price").innerText = price;

    return price;
  } catch {
    document.getElementById("price").innerText = "ERROR";
    return null;
  }
}

// ======================
// 🧠 ULTRA AI (SMC + Momentum)
// ======================
function analyze(price) {

  let signal = "WAIT";
  let text = "รอจังหวะ";

  // 🔥 SMC Break Structure
  if (price > 4495) {
    signal = "BUY";
    text = "BOS ขึ้น + Momentum";
  }

  if (price < 4485) {
    signal = "SELL";
    text = "BOS ลง + Momentum";
  }

  // 🔥 Sniper zone
  if (price > 4498) {
    signal = "BUY";
    text = "Break แรง → Sniper Buy";
  }

  if (price < 4482) {
    signal = "SELL";
    text = "หลุดแรง → Sniper Sell";
  }

  document.getElementById("signal").innerText = signal;
  document.getElementById("analysis").innerText = text;

  return signal;
}

// ======================
// 📢 ยิง Telegram
// ======================
async function sendSignal(signal, price) {

  if (signal === lastSignal) return;

  lastSignal = signal;

  await fetch("/api/send", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      message: `🔥 GOLD AI ULTRA
Signal: ${signal}
Price: ${price}`
    })
  });
}

// ======================
// 🚀 RUN BOT
// ======================
async function runBot() {
  let price = await getPrice();
  if (!price) return;

  let signal = analyze(price);
  sendSignal(signal, price);
}

// 🔥 ทำงานทุก 5 วิ
setInterval(runBot, 5000);

</script>

</body>
</html>
