<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z8 Online</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#020617,#0f172a);
  color: white;
}

/* โลโก้ */
.logo {
  width: 90px;
  display: block;
  margin: 20px auto 10px;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {filter: drop-shadow(0 0 5px #38bdf8);}
  to {filter: drop-shadow(0 0 20px #22c55e);}
}

/* header */
.header {
  text-align: center;
}
.header h1 {
  font-size: 24px;
  color: #38bdf8;
}

/* ผู้แนะนำ */
.ref {
  text-align: center;
  color: #22c55e;
  font-weight: bold;
  margin: 10px 0;
}

/* card */
.container {
  padding: 12px;
}
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 12px;
}

/* input */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}

/* button */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  margin-top: 10px;
}
.btn {
  background: linear-gradient(90deg,#22c55e,#16a34a);
  color: white;
}

/* PDPA */
.pdpa {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  color: #22c55e;
  font-size: 11px;
  padding: 6px;
  overflow: hidden;
}
.pdpa span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 18s linear infinite;
}
@keyframes scroll {
  0% {transform: translateX(0);}
  100% {transform: translateX(-100%);}
}
</style>

<script>
let userLocation = "ไม่ได้อนุญาต";

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLocation = pos.coords.latitude + "," + pos.coords.longitude;
    });
  }
}

function sendToHR() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let contact = document.getElementById("contact").value;

  if (!name || !phone) {
    alert("กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  let message = `
🔥 สมัครงาน Z8 Online

👤 ชื่อ: ${name}
📱 เบอร์: ${phone}
💬 ติดต่อ: ${contact}
📍 พิกัด: ${userLocation}

📌 ผู้แนะนำ: วิน
`;

  let url = "https://www.facebook.com/share/1RtTcrR6Bu/";
  window.open(url);

  navigator.clipboard.writeText(message);
  alert("✅ คัดลอกข้อมูลแล้ว ให้วางส่งให้ HR ในแชท");
}
</script>

</head>

<body onload="getLocation()">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo">

<div class="header">
<h1>🔥 Z8 ONLINE 🔥</h1>
<p>สมัครงานออนไลน์ ทำที่บ้าน</p>
</div>

<div class="ref">
📌 ผู้แนะนำ: วิน
</div>

<div class="container">

<div class="card">
<h3>🔥 รายละเอียดงาน</h3>
<p>💸 งานเสริม / งานหลัก</p>
<p>📱 ใช้มือถือ + อินเทอร์เน็ต</p>
<p>⏰ ทำเวลาไหนก็ได้</p>
</div>

<div class="card">
<h3>📋 กรอกข้อมูล</h3>
<input id="name" placeholder="ชื่อ-นามสกุล">
<input id="phone" placeholder="เบอร์โทร">
<input id="contact" placeholder="Line / Facebook">
<button class="btn" onclick="sendToHR()">📩 ส่งสมัครงานไป HR</button>
</div>

</div>

<div class="pdpa">
<span>🔒 เว็บไซต์นี้มีการแจ้งขอความยินยอมตามกฎหมาย PDPA ข้อมูลจะใช้เพื่อการสมัครงานเท่านั้น</span>
</div>

</body>
</html>
